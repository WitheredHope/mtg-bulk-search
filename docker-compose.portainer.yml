# Compose file for deploying as a Portainer stack (git repository method).
#
# Uses the prebuilt image from GHCR (published by .github/workflows/docker.yml)
# because Portainer Agent environments cannot build images inside a stack.
# Uses a named volume instead of a bind mount so data survives stack redeploys.
services:
  mtg-bulk-search:
    image: ghcr.io/witheredhope/mtg-bulk-search:latest
    container_name: mtg-bulk-search
    ports:
      - "3000:3000"
    volumes:
      - mtg-data:/data
    restart: unless-stopped

volumes:
  mtg-data:
